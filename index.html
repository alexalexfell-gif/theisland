<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="y2jTAuWIOHGZjEVlHQWZikiKp-2kZubUix0gA1uebRo" />
    
    <title>The Island - Experimental Visualization Project</title>
    <meta name="description" content="The Island: A visual support tool for group dynamics created by Alejandro Scuro Rossi.">
    <meta name="author" content="Alejandro Scuro Rossi">
    
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --light: #ecf0f1; --info: #2980b9; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; }
        .scoreboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .score-card { background: var(--primary); color: white; padding: 12px; border-radius: 10px; text-align: center; border-bottom: 4px solid var(--accent); }
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        button { background: var(--success); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button:disabled { background: #95a5a6; cursor: not-allowed; opacity: 0.6; }
        .instruction { background: #fff3cd; color: #856404; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ffeeba; text-align: center; }
        .role-tag { font-size: 0.75em; font-weight: bold; color: var(--accent); display: block; margin-top: 12px; text-transform: uppercase; }
        .player-name-display { font-size: 0.9em; color: #1a252f; font-weight: 800; margin-bottom: 12px; display: block; background: #d6eaf8; padding: 8px; border-radius: 4px; border-left: 5px solid var(--accent); }
        select, input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 6px; }
        .trade-slot { background: #f9f9f9; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-top: 10px; }
        .active-turn { border: 2px solid var(--accent) !important; background: #ebf5fb !important; }
        .maletin-box { background: #eef2f3; border: 2px dashed var(--primary); padding: 10px; border-radius: 8px; margin-top: 10px; }
        
        .role-intro-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .role-intro-table th, .role-intro-table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        .role-intro-table th { background-color: var(--info); color: white; }

        .manual-container { text-align: left; background: #f8f9fa; padding: 25px; border-radius: 8px; border-left: 5px solid var(--info); margin: 25px 0; }
        .manual-container h3 { margin-top: 0; color: var(--info); border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .manual-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; font-size: 0.9em; line-height: 1.6; }
        .req-list { list-style: none; padding: 0; font-weight: bold; }
        .phase-list { padding-left: 18px; }
        .phase-list li { margin-bottom: 8px; }

        .disclaimer-box { font-size: 0.65rem; text-align: justify; background: #f1f2f6; padding: 20px; border: 1px solid #d1d8e0; border-radius: 8px; margin: 15px 0; color: #4b6584; line-height: 1.4; max-height: 250px; overflow-y: auto; border-left: 5px solid #778ca3; }
        
        /* New Styles for Facilitator Guidance */
        .guidance-content { text-align: left; max-height: 500px; overflow-y: auto; padding-right: 10px; margin-bottom: 20px; }
        .guidance-content h3 { color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 5px; margin-top: 20px; }
        .guidance-content ul { padding-left: 20px; }
        .guidance-content li { margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="scoreboard" class="scoreboard" style="display:none;"></div>
    <div id="game-ui"></div>
</div>

<script>
const PrivacyKernel = {
    consentGiven: false,
    grantConsent() {
        this.consentGiven = true;
        Game.paso = 2;
        render();
    },
    wipeSessionData() {
        if (typeof Game !== 'undefined' && Game.equipos) {
            Game.equipos.forEach(e => {
                e.rolesNombres = {};
                e.inventario = [];
                e.maletin = [];
            });
        }
    }
};

window.addEventListener('beforeunload', () => PrivacyKernel.wipeSessionData());

let CATALOGO_BASE = [
    { id: "agua", n: "Water", c: "ali", p: 1 }, { id: "fruta", n: "Fruits", c: "ali", p: 1 }, { id: "latas", n: "Canned Food", c: "ali", p: 1 },
    { id: "botiquin", n: "First Aid Kit", c: "uti", p: 1 }, { id: "cuerda", n: "Rope", c: "uti", p: 1 }, { id: "martillo", n: "Hammer", c: "uti", p: 1 },
    { id: "lona", n: "Tarp", c: "uti", p: 1 }, { id: "encendedor", n: "Lighter", c: "uti", p: 1 }, { id: "mapa", n: "Map", c: "ori", p: 1 }, { id: "radio", n: "Radio", c: "ori", p: 1 }
];
const PACTO_OBJ = [
    { id: "pesca", n: "Fishing Rod", c: "ali", p: 2 },
    { id: "mochila", n: "Backpack", c: "uti", p: 2 },
    { id: "brujula", n: "Compass", c: "ori", p: 2 }
];
const ROLES_OBJ = [
    { id: "antifaz", n: "Mask (Thief)", c: "uti", p: 1, type: "rol" },
    { id: "guantes", n: "Gloves (Gatherer)", c: "ali", p: 1, type: "rol" },
    { id: "machete", n: "Machete (Fighter)", c: "uti", p: 1, type: "rol" },
    { id: "maletin", n: "Suitcase (Merchant)", c: "uti", p: 1, type: "rol" },
    { id: "alianza_mil", n: "Military Alliance (Diplomat)", c: "ori", p: 1, type: "rol" }
];

let Game = {
    paso: 0, // Starts at Facilitator Guidance
    equipos: [
        { nombre: "Alpha", inventario: [], maletin: [], actionsMarket: 0, venganza: false, numJugadores: 5, yaUsoGuantes: false, rolesNombres: {} },
        { nombre: "Beta", inventario: [], maletin: [], actionsMarket: 0, venganza: false, numJugadores: 5, yaUsoGuantes: false, rolesNombres: {} },
        { nombre: "Gamma", inventario: [], maletin: [], actionsMarket: 0, venganza: false, numJugadores: 5, yaUsoGuantes: false, rolesNombres: {} }
    ],
    recoleccion: { indexPaso: 0, secuencia: [{ eq: 0, cant: 1 }, { eq: 1, cant: 1 }, { eq: 2, cant: 2 }, { eq: 1, cant: 1 }, { eq: 0, cant: 1 }] }
};

function render() {
    const ui = document.getElementById('game-ui');
    const sb = document.getElementById('scoreboard');
    if (Game.paso >= 3 && Game.paso < 9) { sb.style.display = 'grid'; updateScoreboard(); } else { sb.style.display = 'none'; }

    if (Game.paso === 0) {
        ui.innerHTML = `
        <div class="card">
            <h2 style="text-align:center; color:var(--primary);">The Island – Facilitator Guidance</h2>
            <div class="guidance-content">
                <p><strong>Purpose:</strong> “The Island” is a team-building simulation designed for experiential learning. It is not an assessment tool and should never be used to evaluate or rank participants professionally. Its value lies in observing group interaction, decision-making patterns, and collaborative dynamics.</p>
                
                <h3>1. Before the Session</h3>
                <ul>
                    <li><strong>Clarify Purpose:</strong> Explain to participants that the simulation is for learning and discussion, not performance evaluation.</li>
                    <li><strong>Set Expectations:</strong> Inform participants that all in-scenario decisions are part of a fictional scenario; there are no “right” or “wrong” answers.</li>
                    <li><strong>Data Privacy:</strong> Ensure participants do not input personal data or sensitive information. Remind them that the simulation runs locally and does not store data.</li>
                    <li><strong>Accessibility & Comfort:</strong> Check that the simulation environment is accessible to all participants and that no participant feels pressured to participate.</li>
                </ul>

                <h3>2. During the Simulation</h3>
                <ul>
                    <li><strong>Observe, Don’t Judge:</strong> Focus on how the group interacts rather than individual performance.</li>
                    <li><strong>Monitor Well-Being:</strong> Watch for signs of stress, frustration, or conflict. Pause or adjust the session if participants feel uncomfortable.</li>
                    <li><strong>Encourage Reflection:</strong> After key decisions, prompt discussion about group dynamics, communication, and collaboration. Keep feedback constructive and non-judgmental.</li>
                    <li><strong>Maintain Confidentiality:</strong> Avoid sharing individual decisions or behaviors outside the group.</li>
                </ul>

                <h3>3. After the Simulation</h3>
                <ul>
                    <li><strong>Debrief Thoroughly:</strong> Facilitate a discussion on insights, decision-making processes, and team dynamics. Emphasize learning points over outcomes.</li>
                    <li><strong>Avoid Professional Judgments:</strong> Do not use the results to evaluate participants’ leadership, teamwork, or suitability for roles.</li>
                    <li><strong>Document Safely:</strong> If you take notes for training purposes, avoid including personal or identifying information.</li>
                </ul>

                <h3>4. Legal & Ethical Responsibilities</h3>
                <ul>
                    <li>Ensure compliance with local employment and data protection laws (e.g., GDPR, CCPA, LGPD).</li>
                    <li>Participants’ safety, well-being, and consent are your responsibility as facilitator.</li>
                    <li>By using the tool, you accept responsibility for ethical management of the simulation and any outcomes.</li>
                </ul>

                <h3>5. Recommended Best Practices</h3>
                <ul>
                    <li>Keep sessions short and focused to avoid participant fatigue.</li>
                    <li>Encourage equal participation and inclusion.</li>
                    <li>Emphasize that the simulation is a learning tool, not a competitive assessment.</li>
                    <li>Use the simulation in a professional, structured environment with clear facilitation.</li>
                </ul>
            </div>
            <button onclick="Game.paso=1; render();">Accept & Continue</button>
        </div>`;
    }
    else if (Game.paso === 1) {
        ui.innerHTML = `
        <div class="card" style="text-align:center">
            <h1>🏝️ THE ISLAND</h1>
            <p style="font-weight:bold; color:var(--primary); margin-bottom:0;">Author: Alejandro Scuro Rossi</p>
            <div class="manual-container">
                <h3>📜 Survival Guide</h3>
                <div class="manual-grid">
                    <div>
                        <p><b>Goal:</b> Gather resources before finishing Step 8.</p>
                        <ul class="req-list">
                            <li style="color:var(--danger)">🍎 4 Food (Ali)</li>
                            <li style="color:var(--primary)">🛠️ 3 Utilities (Uti)</li>
                            <li style="color:var(--info)">🧭 2 Orientation (Ori)</li>
                        </ul>
                        <p><b>Available Roles:</b></p>
                        <table class="role-intro-table" style="font-size:0.8em;">
                           <tr><td><b>Gatherer</b></td><td>Collects resources.</td></tr>
                           <tr><td><b>Thief</b></td><td>Steals items at night.</td></tr>
                           <tr><td><b>Fighter</b></td><td>Protects and attacks.</td></tr>
                           <tr><td><b>Diplomat</b></td><td>Negotiates alliances.</td></tr>
                           <tr><td><b>Merchant</b></td><td>Trades in the market.</td></tr>
                        </table>
                    </div>
                    <div>
                        <p><b>Dynamic Phases:</b></p>
                        <ol class="phase-list">
                            <li>Registration & Roles</li>
                            <li>Planning</li>
                            <li>Night Theft</li>
                            <li>The Pact</li>
                            <li>The Fight</li>
                            <li>Gathering</li>
                            <li>Market</li>
                            <li>Final Results</li>
                        </ol>
                    </div>
                </div>
            </div>

         <div style="font-size: 0.7rem; text-align: justify; background: #f1f2f6; padding: 20px; border: 1px solid #d1d8e0; border-radius: 8px; margin: 15px 0; color: #4b6584; line-height: 1.5; max-height: 250px; overflow-y: auto; border-left: 5px solid #778ca3;">
                <p style="text-align: center; font-weight: bold; color: #2f3542; margin-bottom: 10px;">LEGAL NOTICE, DISCLAIMER AND TERMS OF USE OF "THE ISLAND"</p>
                
                <p><b>1. NATURE AND PURPOSE OF THE SOFTWARE:</b> "The Island" is a visual and logistical support tool designed to facilitate group dynamics of a training, experiential, or skill-development nature. It is NOT an automated assessment system (ATS), nor a validated psychometric test, and it does not generate personality profiles autonomously. Its purpose is to serve as support for professionals (educators, facilitators, HR, group psychologists) in managing simulations; the interpretation and application of results are the sole responsibility of the professional user.</p>
                
                <p><b>2. INTELLECTUAL PROPERTY:</b> The methodology, game design, role logic, and scoring system are the exclusive intellectual property of <b>Alejandro Scuro Rossi</b>.</p>
                
                <p><b>3. PRIVACY AND DATA PROTECTION (GDPR):</b> "The Island" operates under a Zero-Server architecture, meaning it does not store participants' personal data on its servers. All information generated during the dynamic is ephemeral and irreversibly destroyed upon refreshing or closing the browser tab. The professional using the tool is the <b>SOLELY RESPONSIBLE</b> for informing participants about the processing of their personal data within the context of the dynamic and for complying with all obligations of the General Data Protection Regulation (GDPR) and applicable national legislation.</p>
                
                <p><b>4. DISCLAIMER:</b> Alejandro Scuro Rossi expressly disclaims any and all liability for decisions, conclusions, or interpretations made by professional users based on the results or experience of "The Island" dynamic. This includes, but is not limited to, hiring decisions, personnel development, or any other professional application. The use of "The Island" is as a support tool, and the responsibility for its application, interpretation, and derived consequences rests entirely with the professional user.</p>
                
                <p><b>5. ACCEPTANCE AND RESPONSIBILITY OF THE PROFESSIONAL USER:</b> By clicking "Start Session", the professional user accepts and acknowledges being the sole and exclusive party responsible for informing participants about the use of their data and the ethical management of the resulting information.</p>
                <p>Professional users are solely responsible for ensuring compliance with all applicable laws and regulations, including GDPR, CCPA, LGPD, and local employment or data protection legislation.

Professional users should ensure that scenarios are conducted in a manner that respects participants’ well-being, avoids undue stress or discomfort, and does not result in discriminatory or unfair treatment.

In no event shall Alejandro Scuro Rossi be liable for any direct, indirect, incidental, special, consequential, or punitive damages arising from the use of “The Island,” including but not limited to workplace or professional outcomes.</p> 
            </div>

            <div style="margin-top:15px;">
                <input type="checkbox" id="consent_check" onchange="document.getElementById('start_btn').disabled = !this.checked">
                <label for="consent_check" style="color: #2d3436; font-weight: bold; cursor:pointer;">I have read the disclaimer and provide my consent in accordance with GDPR.</label>
            </div>
            
            <button id="start_btn" disabled onclick="PrivacyKernel.grantConsent()">Start Session</button>
        </div>`;
    }
    else if (Game.paso === 2) {
        ui.innerHTML = `<div class="card"><h2>Step 2: Player Registration</h2><div class="grid">${Game.equipos.map((e, i) => `
            <div class="card">
                <h3>Team ${e.nombre}</h3>
                <label>Amount:</label>
                <select id="sz_${i}" onchange="updateFieldsUI(${i})">
                    <option value="5">5 Players</option>
                    <option value="4">4 Players</option>
                    <option value="3">3 Players</option>
                </select>
                <div id="fields_${i}">${generateFieldsHTML(5)}</div>
            </div>`).join("")}</div><button onclick="saveRegistration()">Continue</button></div>`;
    }
    else if (Game.paso === 3) {
        ui.innerHTML = `<div class="card"><h2>Step 3: Planning</h2><p class="instruction">Select exactly <b>5 items</b> (Ctrl+Click).</p><div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>${e.nombre}</h3><select id="p_${i}" multiple style="height:150px;">${CATALOGO_BASE.map(o => `<option value="${o.id}">[${o.c.toUpperCase()}] ${o.n}</option>`).join("")}</select></div>`).join("")}</div><button onclick="saveInv3()">Next</button></div>`;
    }
    else if (Game.paso === 3.2) {
        ui.innerHTML = `
        <div class="card">
            <h2>Step 3.2: Introduction to Role Objects</h2>
            <p>In this system, <b>Role Objects</b> are functional components that modify a player's capabilities during specific game phases. Each object acts as a permanent buff or a conditional rule modifier.</p>
            <table class="role-intro-table">
                <thead>
                    <tr><th>Role Item</th><th>Game Mechanic</th></tr>
                </thead>
                <tbody>
                    <tr><td><b>Gloves</b></td><td><b>Passive:</b> Allows the Gatherer to collect <b>1 extra item</b> during the search phase.</td></tr>
                    <tr><td><b>Suitcase</b></td><td><b>Defense:</b> Automatically protects <b>2 items</b> from being stolen on every <b>Step</b>.</td></tr>
                    <tr><td><b>Military Alliance</b></td><td><b>Diplomacy:</b> If a pact is made, both teams are prohibited from attacking each other during the <b>Fight Step</b>.</td></tr>
                    <tr><td><b>Machete</b></td><td><b>Offense:</b> The Fighter gains <b>1 extra attack</b> during combat resolution.</td></tr>
                    <tr><td><b>Mask</b></td><td><b>Stealth:</b> The Thief <b>steals 1 extra item</b> when performing a theft action.</td></tr>
                </tbody>
            </table>
            <button onclick="Game.paso=3.5; render();">Continue to Assignments</button>
        </div>`;
    }
    else if (Game.paso === 3.5) {
        ui.innerHTML = `<div class="card"><h2>Step 3.5: Role Assignment</h2><p class="instruction">Select 2 role items (Ctrl+Click).</p><div class="grid">${Game.equipos.map((e, i) => `<div class="card"><h3>${e.nombre}</h3><select id="ro_${i}" multiple style="height:120px;">${ROLES_OBJ.map(o => `<option value="${o.id}">${o.n}</option>`).join("")}</select></div>`).join("")}</div><button onclick="saveRoleInv()">Confirm</button></div>`;
    }
    else if (Game.paso === 4) {
        ui.innerHTML = `<div class="card"><h2>Step 4: Night Theft</h2><div class="grid">${Game.equipos.map((e, i) => {
            const hasA = e.inventario.some(it => it.id === 'antifaz');
            return `<div class="card"><h3>${e.nombre} ${hasA ? '🎭' : ''}</h3><span class="player-name-display">👤 Thief: ${e.rolesNombres['Thief'] || 'Not assigned'}</span>${renderMaletinUI(i)}<select id="n_act_${i}" onchange="updateNightUI(${i})"><option value="def">Defend</option><option value="atk">Steal (${hasA?2:1})</option></select><div id="n_ui_${i}" style="display:none"><select id="n_vic_${i}" onchange="loadNightItems(${i})"><option value="">Victim?</option>${Game.equipos.map((v, vi) => i !== vi ? `<option value="${vi}">${v.nombre}</option>` : '').join("")}</select><select id="n_obj_${i}" multiple style="height:80px;"></select></div></div>`;
        }).join("")}</div><button onclick="processNightRobbery()">Execute</button></div>`;
    }
    else if (Game.paso === 5) {
        ui.innerHTML = `<div class="card"><h2>Step 5: The Pact</h2><p class="instruction">Form a pact (check 2 items). The excluded team receives 1 item and <b>Revenge</b>.</p><div class="grid">${Game.equipos.map((e,i)=>`<div class="card"><h3>${e.nombre}</h3><span class="player-name-display">👤 Diplomat: ${e.rolesNombres['Diplomat'] || 'Not assigned'}</span>${renderMaletinUI(i)}<input type="checkbox" class="p-check" value="${i}" id="chk${i}" onchange="updatePactUI()"><label for="chk${i}"> Joins Pact</label><div id="pact_choice_${i}" style="display:none; margin-top:10px;"><b>Choice:</b><select id="pact_sel_${i}" multiple style="height:80px;">${PACTO_OBJ.map(o=>`<option value="${o.id}">[${o.c.toUpperCase()}] ${o.n}</option>`).join("")}</select></div><div id="vengeance_choice_${i}" style="display:none; margin-top:10px; color:var(--danger);"><b>Revenge Reward:</b><select id="veng_sel_${i}">${PACTO_OBJ.map(o=>`<option value="${o.id}">[${o.c.toUpperCase()}] ${o.n}</option>`).join("")}</select></div></div>`).join("")}</div><button onclick="processPact()">Close Pact</button></div>`;
        updatePactUI();
    }
    else if (Game.paso === 6) {
        ui.innerHTML = `<div class="card"><h2>Step 6: The Fight</h2><div class="grid">${Game.equipos.map((e, i) => {
            let numAtks = 1 + (e.inventario.some(it => it.id === 'machete') ? 1 : 0) + (e.venganza ? 1 : 0);
            let validVictims = Game.equipos.map((v, vi) => {
                if (i === vi) return null;
                const isPactAlly = Game.pactTeams && Game.pactTeams.includes(i) && Game.pactTeams.includes(vi);
                const hasAllianceItem = e.inventario.some(it => it.id === 'alianza_mil');
                if (isPactAlly && hasAllianceItem) return null;
                return `<option value="${vi}">${v.nombre}</option>`;
            }).filter(opt => opt !== null).join("");
            return `<div class="card"><h3>${e.nombre} ${e.venganza?'🔥':''}</h3><span class="player-name-display">👤 Fighter: ${e.rolesNombres['Fighter'] || 'Not assigned'}</span><div id="lucha_area_${i}">${Array.from({length: numAtks}).map((_, a) => `<div class="trade-slot" id="atk_block_${i}_${a}"><b>Attack ${a+1}:</b><select id="vic_sel_${i}_${a}" onchange="toggleAtkControls(${i}, ${a})"><option value="">Victim?</option>${validVictims}</select><div id="atk_ctrls_${i}_${a}" style="display:none;"><button onclick="handleLuchaAtk(${i}, ${a}, true)">SUCCESS</button><button onclick="handleLuchaAtk(${i}, ${a}, false)" style="background:#95a5a6">FAIL</button></div><div id="rob_area_${i}_${a}" style="display:none;"><select id="item_to_rob_${i}_${a}"></select><button onclick="finishLuchaRob(${i}, ${a})">Steal</button></div></div>`).join("")}</div></div>`;
        }).join("")}</div><button onclick="Game.paso=7; render()">Next</button></div>`;
    }
    else if (Game.paso === 7) {
        const tIdx = Game.recoleccion.indexPaso;
        const eqIdx = Game.recoleccion.secuencia[tIdx].eq;
        const e = Game.equipos[eqIdx];
        let extra = (e.inventario.some(it => it.id === 'guantes') && !e.yaUsoGuantes) ? 1 : 0;
        const cant = Game.recoleccion.secuencia[tIdx].cant + extra;
        ui.innerHTML = `<div class="card"><h2>Step 7: Gathering</h2><div class="grid">${Game.equipos.map((eq, i) => `<div class="card ${eqIdx===i?'active-turn':''}" style="opacity:${eqIdx===i?'1':'0.5'}"><h3>${eq.nombre}</h3><span class="player-name-display">👤 Gatherer: ${eq.rolesNombres['Gatherer'] || 'Not assigned'}</span>${eqIdx===i ? `<select id="rec_sel" multiple style="height:120px;">${CATALOGO_BASE.map(o=>`<option value="${o.id}">[${o.c.toUpperCase()}] ${o.n}</option>`).join("")}</select><button onclick="ejecutarTurnoRecoleccion(${i}, ${cant})">Gather (${cant})</button>` : `<p>Waiting...</p>`}</div>`).join("")}</div></div>`;
    }
    else if (Game.paso === 8) {
        ui.innerHTML = `<div class="card"><h2>Step 8: Market</h2><div class="grid">${Game.equipos.map((e, i) => {
            const fin = e.actionsMarket >= 2;
            return `<div class="card" style="opacity:${fin?'0.7':'1'}"><h3>${e.nombre}</h3><span class="player-name-display">👤 Merchant: ${e.rolesNombres['Merchant'] || 'Not assigned'}</span><div class="trade-slot"><select id="m_partner_${i}" onchange="updateTradeProposalUI(${i})" ${fin?'disabled':''}><option value="">Partner...</option>${Game.equipos.map((p, pIdx) => (pIdx !== i && p.actionsMarket < 2) ? `<option value="${pIdx}">${p.nombre}</option>` : '').join("")}</select><div id="trade_ui_${i}" style="display:none;"><select id="m_give_${i}">${e.inventario.map((it, idx) => it.type !== 'rol' ? `<option value="${idx}">[${it.c.toUpperCase()}] ${it.n}</option>` : '').join("")}</select><div id="partner_give_area_${i}"></div><button onclick="ejecutarIntercambioDirecto(${i})">Confirm</button></div></div></div>`;
        }).join("")}</div><button onclick="Game.paso=9; render()">Finish</button></div>`;
    }
    else if (Game.paso === 9) {
        ui.innerHTML = `<div class="card" style="text-align:center"><h2>Final Results</h2><div class="grid">${Game.equipos.map(e => {
            const inv = [...e.inventario, ...e.maletin];
            const p = inv.reduce((acc, i) => { acc[i.c] = (acc[i.c] || 0) + (i.p || 0); return acc; }, { ali:0, uti:0, ori:0 });
            const win = p.ali >= 4 && p.uti >= 3 && p.ori >= 2;
            return `<div class="card" style="border-top: 5px solid ${win?'#27ae60':'#e74c3c'}"><h3>${e.nombre}</h3><h1 style="color:${win?'#27ae60':'#e74c3c'}">${win?'SURVIVES':'DIES'}</h1><p>🍎${p.ali}/4 🛠${p.uti}/3 🧭${p.ori}/2</p></div>`;
        }).join("")}</div><button onclick="location.reload()">Restart</button></div>`;
    }
}

function generateFieldsHTML(n) {
    let roles = [];
    if (n == 5) {
        roles = ["Thief", "Diplomat", "Fighter", "Gatherer", "Merchant"];
    } else if (n == 4) {
        // User rule: if 4 players, first has 2 roles
        roles = ["Thief/Diplomat", "Fighter", "Gatherer", "Merchant"];
    } else if (n == 3) {
        // User rule: if 3 players, first two have 2 roles
        roles = ["Thief/Diplomat", "Fighter/Gatherer", "Merchant"];
    }
    return roles.map(r => `<span class="role-tag">${r}</span><input type="text" class="player-input" data-role="${r}" placeholder="Name...">`).join("");
}

function updateFieldsUI(i) { document.getElementById(`fields_${i}`).innerHTML = generateFieldsHTML(parseInt(document.getElementById(`sz_${i}`).value)); }

function saveRegistration() {
    for(let i=0; i<3; i++) {
        Game.equipos[i].rolesNombres = {};
        const inputs = document.querySelectorAll(`#fields_${i} .player-input`);
        inputs.forEach(input => {
            const name = input.value.trim() || "Unknown";
            const r = input.getAttribute("data-role").toLowerCase();
            if(r.includes("thief")) Game.equipos[i].rolesNombres['Thief'] = name;
            if(r.includes("diplomat")) Game.equipos[i].rolesNombres['Diplomat'] = name;
            if(r.includes("fighter")) Game.equipos[i].rolesNombres['Fighter'] = name;
            if(r.includes("gatherer")) Game.equipos[i].rolesNombres['Gatherer'] = name;
            if(r.includes("merchant")) Game.equipos[i].rolesNombres['Merchant'] = name;
        });
    }
    Game.paso = 3; render();
}

function updatePactUI() {
    let ps = Array.from(document.querySelectorAll('.p-check:checked')).map(c=>parseInt(c.value));
    Game.equipos.forEach((_, i) => {
        const choiceDiv = document.getElementById(`pact_choice_${i}`);
        const vengDiv = document.getElementById(`vengeance_choice_${i}`);
        if(choiceDiv) choiceDiv.style.display = ps.includes(i) ? "block" : "none";
        if(vengDiv) vengDiv.style.display = (ps.length === 2 && !ps.includes(i)) ? "block" : "none";
    });
}

function processPact() {
    let ps = Array.from(document.querySelectorAll('.p-check:checked')).map(c=>parseInt(c.value));
    if(ps.length !== 2) return alert("Select exactly 2 teams.");
    
    Game.pactTeams = ps;

    Game.equipos.forEach((e, i) => {
        if(ps.includes(i)) {
            const selEl = document.getElementById(`pact_sel_${i}`);
            Array.from(selEl.selectedOptions).forEach(opt => {
                e.inventario.push({...PACTO_OBJ.find(p => p.id === opt.value)});
            });
            e.venganza = false;
        } else { 
            const vengSel = document.getElementById(`veng_sel_${i}`);
            if(vengSel) {
                e.inventario.push({...PACTO_OBJ.find(p => p.id === vengSel.value)});
            }
            e.venganza = true; 
        }
    });
    Game.paso = 6; render();
}

function updateScoreboard() {
    document.getElementById('scoreboard').innerHTML = Game.equipos.map(e => {
        const inv = [...e.inventario, ...e.maletin];
        const p = inv.reduce((acc, i) => { acc[i.c] = (acc[i.c] || 0) + (i.p || 0); return acc; }, { ali:0, uti:0, ori:0 });
        return `<div class="score-card"><b>${e.nombre}</b><br>🍎${p.ali} 🛠${p.uti} 🧭${p.ori}</div>`;
    }).join("");
}

function saveInv3() {
    for(let i=0; i<3; i++) {
        const s = Array.from(document.getElementById(`p_${i}`).selectedOptions);
        if(s.length!==5) return alert(`Select 5 for ${Game.equipos[i].nombre}`);
        Game.equipos[i].inventario = s.map(o => ({...CATALOGO_BASE.find(b => b.id === o.value)}));
    }
    Game.paso = 3.2; render();
}

function saveRoleInv() {
    for(let i=0; i<3; i++) {
        const s = Array.from(document.getElementById(`ro_${i}`).selectedOptions);
        s.forEach(o => Game.equipos[i].inventario.push({...ROLES_OBJ.find(x => x.id === o.value)}));
    }
    Game.paso = 4; render();
}

function updateNightUI(eq) { document.getElementById(`n_ui_${eq}`).style.display = (document.getElementById(`n_act_${eq}`).value==='atk'?'block':'none'); }

function loadNightItems(eq) {
    const v = document.getElementById(`n_vic_${eq}`).value;
    if(v==="") return;
    document.getElementById(`n_obj_${eq}`).innerHTML = Game.equipos[v].inventario.map((it, idx) => it.type !== 'rol' ? `<option value="${idx}">[${it.c.toUpperCase()}] ${it.n}</option>` : '').join("");
}

function processNightRobbery() {
    Game.equipos.forEach((e, i) => {
        if (document.getElementById(`n_act_${i}`).value === 'atk') {
            const v = parseInt(document.getElementById(`n_vic_${i}`).value);
            const opts = Array.from(document.getElementById(`n_obj_${i}`).selectedOptions).map(o => parseInt(o.value)).sort((a,b)=>b-a);
            if (document.getElementById(`n_act_${v}`).value !== 'def') {
                opts.forEach(idx => {
                    if(Game.equipos[v].inventario[idx]) Game.equipos[i].inventario.push(Game.equipos[v].inventario.splice(idx, 1)[0]);
                });
            }
        }
    });
    Game.paso = 5; render();
}

function toggleAtkControls(eq, atk) { document.getElementById(`atk_ctrls_${eq}_${atk}`).style.display = "block"; }

function handleLuchaAtk(eq, atk, win) {
    if(!win) { document.getElementById(`atk_block_${eq}_${atk}`).innerHTML = "FAIL"; return; }
    const vic = document.getElementById(`vic_sel_${eq}_${atk}`).value;
    document.getElementById(`atk_ctrls_${eq}_${atk}`).style.display = "none";
    document.getElementById(`rob_area_${eq}_${atk}`).style.display = "block";
    document.getElementById(`item_to_rob_${eq}_${atk}`).innerHTML = Game.equipos[vic].inventario.map((it, idx) => it.type !== 'rol' ? `<option value="${idx}">[${it.c.toUpperCase()}] ${it.n}</option>` : '').join("");
}

function finishLuchaRob(eq, atk) {
    const vic = document.getElementById(`vic_sel_${eq}_${atk}`).value;
    const idx = document.getElementById(`item_to_rob_${eq}_${atk}`).value;
    if(idx !== "") Game.equipos[eq].inventario.push(Game.equipos[vic].inventario.splice(idx, 1)[0]);
    document.getElementById(`atk_block_${eq}_${atk}`).innerHTML = "SUCCESS";
    updateScoreboard();
}

function ejecutarTurnoRecoleccion(eqIdx, cant) {
    const opts = Array.from(document.getElementById('rec_sel').selectedOptions);
    if (opts.length !== cant) return alert(`Choose ${cant}`);
    opts.forEach(o => {
        const idx = CATALOGO_BASE.findIndex(x => x.id === o.value);
        if(idx !== -1) Game.equipos[eqIdx].inventario.push({...CATALOGO_BASE.splice(idx, 1)[0]});
    });
    Game.equipos[eqIdx].yaUsoGuantes = true;
    Game.recoleccion.indexPaso++;
    if(Game.recoleccion.indexPaso >= Game.recoleccion.secuencia.length) Game.paso = 8;
    render();
}

function updateTradeProposalUI(eqIdx) {
    const pIdx = document.getElementById(`m_partner_${eqIdx}`).value;
    if (pIdx === "") { document.getElementById(`trade_ui_${eqIdx}`).style.display = "none"; return; }
    document.getElementById(`trade_ui_${eqIdx}`).style.display = "block";
    document.getElementById(`partner_give_area_${eqIdx}`).innerHTML = `<b>${Game.equipos[pIdx].nombre} gives:</b><select id="m_partner_give_${eqIdx}">${Game.equipos[pIdx].inventario.map((it, idx) => it.type !== 'rol' ? `<option value="${idx}">[${it.c.toUpperCase()}] ${it.n}</option>` : '').join("")}</select>`;
}

function ejecutarIntercambioDirecto(eqIdx) {
    const pIdx = document.getElementById(`m_partner_${eqIdx}`).value;
    const gIdx = document.getElementById(`m_give_${eqIdx}`).value;
    const pgIdx = document.getElementById(`m_partner_give_${eqIdx}`).value;
    const itemA = Game.equipos[eqIdx].inventario.splice(gIdx, 1)[0];
    const itemB = Game.equipos[pIdx].inventario.splice(pgIdx, 1)[0];
    Game.equipos[eqIdx].inventario.push(itemB); Game.equipos[pIdx].inventario.push(itemA);
    Game.equipos[eqIdx].actionsMarket++; Game.equipos[pIdx].actionsMarket++;
    render();
}

function renderMaletinUI(eqIdx) {
    const e = Game.equipos[eqIdx];
    if (!e.inventario.some(it => it.id === 'maletin') && !e.maletin.some(it => it.id === 'maletin')) return '';
    return `<div class="maletin-box"><b>🧳 Suitcase (${e.maletin.length}/2)</b><br>${e.maletin.length < 2 ? `<select id="to_m_${eqIdx}">${e.inventario.map((it, idx) => it.type !== 'rol' ? `<option value="${idx}">[${it.c.toUpperCase()}] ${it.n}</option>` : '').join("")}</select><button onclick="addToMaletin(${eqIdx})" style="padding:4px; font-size:0.8em;">Store</button>` : 'Full'}</div>`;
}

function addToMaletin(eqIdx) {
    const idx = document.getElementById(`to_m_${eqIdx}`).value;
    Game.equipos[eqIdx].maletin.push(Game.equipos[eqIdx].inventario.splice(idx, 1)[0]);
    render();
}

window.onload = render;
</script>
